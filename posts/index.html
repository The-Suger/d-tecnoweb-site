    :root {

    /* ===== NAV ===== */
    #site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    #site-nav.scrolled { border-bottom-color: var(--gray-300); }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo-img {

      width: auto;

    }
    .nav-logo-text {

      font-weight: 900;
      color: var(--black);
      letter-spacing: 0.02em;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.82rem;
      color: #444;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--black); }
    .nav-cta {
      background: var(--black);
      color: var(--white) !important;
      font-size: 0.82rem !important;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: #333 !important; }

    /* ===== PAGE HERO ===== */
    .page-hero {
      position: relative;
      height: 50vh;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .page-hero-bg {
      position: absolute;
      inset: 0;
      background: url('../images/laptop.jpg') center center / cover no-repeat;
      background-color: #222;
    }
    .page-hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.52);
    }
    .page-hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .page-hero-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .page-hero-sub {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;

    /* ===== NEWS LIST ===== */
    .news-main {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 48px 120px;
    }
    .news-list { list-style: none; }
    .news-list-item {
      border-bottom: 1px solid var(--gray-300);
    }
    .news-list-item:first-child { border-top: 1px solid var(--gray-300); }
    .news-list-item a {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 28px 0;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .news-list-item a:hover { opacity: 0.55; }
    .news-list-date {
      font-size: 0.78rem;
      color: var(--gray-500);
      letter-spacing: 0.05em;
    }
    .news-list-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--black);
      line-height: 1.55;
    }

    .back-btn-wrap {
      text-align: center;
      margin-top: 64px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--black);
      color: var(--white);
      font-size: 0.875rem;
      font-weight: 700;
      padding: 16px 40px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #333; }

    /* ===== FOOTER ===== */

      text-decoration: none;

    .footer-social a:hover { background: #fff; border-color: #fff; color: #111; }

    .footer-nav-row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: flex-end; }
    .footer-nav a {

    }
    .footer-nav a:hover { color: #fff; }
    .footer-copy { font-size: 0.72rem; color: rgba(255,255,255,0.3); }

    @media (max-width: 768px) {

      .news-main { padding: 60px 24px 80px; }

      .footer-top { flex-direction: column; }
      .footer-nav { align-items: flex-start; }
      .footer-nav-row { justify-content: flex-start; }
    }
